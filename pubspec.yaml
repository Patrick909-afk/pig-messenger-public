name: pmessenger
description: PMessenger - стильный мессенджер для друзей на Flutter + Supabase.
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.6.0
  timeago: ^3.7.0
  shared_preferences: ^2.3.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: Monocraft
      fonts:
        - asset: assets/fonts/Monocraft.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon_round.png
  adaptive_icon_background: "#10151A"
  adaptive_icon_foreground: assets/icons/app_icon_round.png
