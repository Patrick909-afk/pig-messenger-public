name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable

      - name: Regenerate Android host project
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          cp lib/main.dart /tmp/main.dart
          flutter create . --platforms=android --project-name pmessenger --org com.pmessenger --overwrite
          cp /tmp/pubspec.yaml pubspec.yaml
          cp /tmp/main.dart lib/main.dart
          python3 - <<'PY2'
          from pathlib import Path
          mf = Path('android/app/src/main/AndroidManifest.xml')
          s = mf.read_text()
          if 'android.permission.INTERNET' not in s:
              s = s.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET" />')
          mf.write_text(s)
          st = Path('android/app/src/main/res/values/strings.xml')
          st.write_text('<resources>\n    <string name="app_name">PMessenger</string>\n</resources>\n')
          PY2

      - name: Install dependencies
        run: flutter pub get

      - name: Build launcher icons
        run: flutter pub run flutter_launcher_icons

      - name: Build release APK
        run: |
          SUPABASE_URL="${{ vars.SUPABASE_URL }}"
          SUPABASE_ANON_KEY="${{ vars.SUPABASE_ANON_KEY }}"
          CHAT_CRYPTO_SECRET="${{ vars.CHAT_CRYPTO_SECRET }}"

          if [ -z "$SUPABASE_URL" ]; then
            SUPABASE_URL="https://tmgiciwryliplkvewlhp.supabase.co"
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtZ2ljaXdyeWxpcGxrdmV3bGhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MjU4NzEsImV4cCI6MjA5MTEwMTg3MX0.z0X3Yo5VCDxxvhswI3Q_rF99w2My8nWfspXN3fxBJAM"
          fi
          if [ -z "$CHAT_CRYPTO_SECRET" ]; then
            CHAT_CRYPTO_SECRET="pmessenger_change_this_secret"
          fi

          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=CHAT_CRYPTO_SECRET="$CHAT_CRYPTO_SECRET"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: PMessenger APK ${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
