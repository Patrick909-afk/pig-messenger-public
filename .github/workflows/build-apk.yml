name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable

      - name: Regenerate Android host project
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          cp lib/main.dart /tmp/main.dart
          flutter create . --platforms=android --project-name pmessenger --org com.pmessenger --overwrite
          cp /tmp/pubspec.yaml pubspec.yaml
          cp /tmp/main.dart lib/main.dart
          python3 - <<'PY2'
          from pathlib import Path
          mf = Path('android/app/src/main/AndroidManifest.xml')
          s = mf.read_text()
          if 'android.permission.INTERNET' not in s:
              s = s.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET" />')
          mf.write_text(s)
          st = Path('android/app/src/main/res/values/strings.xml')
          st.write_text('<resources>\n    <string name="app_name">PIG Messenger</string>\n</resources>\n')
          PY2

      - name: Install dependencies
        run: flutter pub get

      - name: Build launcher icons
        run: flutter pub run flutter_launcher_icons

      - name: Build release APK
        run: |
          SUPABASE_URL="${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}"
          SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}"
          CHAT_CRYPTO_SECRET="${{ secrets.CHAT_CRYPTO_SECRET || vars.CHAT_CRYPTO_SECRET }}"

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$CHAT_CRYPTO_SECRET" ]; then
            echo "Missing SUPABASE_URL / SUPABASE_ANON_KEY / CHAT_CRYPTO_SECRET"
            exit 1
          fi

          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=CHAT_CRYPTO_SECRET="$CHAT_CRYPTO_SECRET"

      - name: Install pigz
        run: |
          sudo apt-get update
          sudo apt-get install -y pigz

      - name: Compress APK with pigz
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/app-release.apk.copy
          pigz -f -9 build/app/outputs/flutter-apk/app-release.apk.copy
          mv build/app/outputs/flutter-apk/app-release.apk.copy.gz build/app/outputs/flutter-apk/app-release.apk.gz

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: PMessenger APK ${{ github.run_number }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-release.apk.gz
